<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f2f2f;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #ff6600;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        /* Efeito focus */
        input:focus, select:focus, textarea:focus {
            border-color: #ff6600;
            box-shadow: 0 0 5px #ff6600;
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #ff6600;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Hover no botão */
        button:hover {
            background-color: #cc5200;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 15px;
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h2>Formulário</h2>

    <form>

        <label>Nome:</label>
        <input type="text" required>

        <label>E-mail:</label>
        <input type="email" required>

        <label>Senha:</label>
        <input type="password" required>

        <label>Data de nascimento:</label>
        <input type="date">

        <label>Curso:</label>
        <select>
            <option>Engenharia de Software</option>
            <option>Direito</option>
            <option>Administração</option>
        </select>

        <label>Sexo:</label>
        <div class="radio-group">
            <label><input type="radio" name="sexo"> Masculino</label>
            <label><input type="radio" name="sexo"> Feminino</label>
        </div>

        <label>Interesses:</label>
        <div class="checkbox-group">
            <label><input type="checkbox"> Programação</label>
            <label><input type="checkbox"> Jogos</label>
            <label><input type="checkbox"> Música</label>
        </div>

        <label>Comentários:</label>
        <textarea rows="4"></textarea>

        <label>Upload de foto:</label>
        <input type="file">

        <button type="submit">Enviar</button>

    </form>
</div>

</body>
</html>
